<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Réservations — SereniSpa</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header" role="banner">
    <div class="header__inner">
      <a href="index.html" class="header__logo" aria-label="SereniSpa — Retour à l'accueil">
        <span class="logo-icon" aria-hidden="true">🌿</span>
        <span class="logo-text">SereniSpa</span>
      </a>
      <nav class="nav" role="navigation" aria-label="Navigation principale">
        <button class="burger" id="burger-btn" aria-expanded="false" aria-label="Ouvrir le menu">
          <span class="burger__line" aria-hidden="true"></span>
          <span class="burger__line" aria-hidden="true"></span>
          <span class="burger__line" aria-hidden="true"></span>
        </button>
        <ul class="nav__list" id="nav-menu">
          <li><a href="index.html#massages" class="nav__link">Nos Massages</a></li>
          <li><a href="index.html#reservation" class="nav__link nav__link--cta">Réserver</a></li>
          <li id="nav-auth">
            <button id="nav-logout-btn" class="nav__user-btn" aria-label="Déconnexion" style="display: none; background: none; border: none; cursor: pointer;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </button>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main-content">
    <section class="section" style="margin-top: 4rem;">
      <div class="section__header">
        <h1 class="section__title">Mes Réservations</h1>
        <p class="section__subtitle">Gérez vos massages réservés</p>
      </div>

      <!-- État: non connecté -->
      <div id="not-logged-in" style="text-align: center; padding: 2rem;">
        <p>🔒 Vous devez être connecté pour voir vos réservations.</p>
        <a href="index.html#connexion" class="btn">Se connecter</a>
      </div>

      <!-- État: connecté -->
      <div id="logged-in" hidden>
        <div id="reservations-container">
          <p style="text-align: center; color: var(--texte-gris);">Chargement de vos réservations...</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <div class="footer__brand">
        <span class="logo-icon" aria-hidden="true">🌿</span>
        <span class="logo-text">SereniSpa</span>
        <p class="footer__tagline">Bien-être éthique &amp; digital</p>
      </div>
    </div>
    <div class="footer__bottom">
      <p>&copy; 2026 SereniSpa. Tous droits réservés.</p>
    </div>
  </footer>

  <div id="toast-container" class="toast-container" aria-live="assertive" aria-atomic="true"></div>

  <script>
    const API_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:3000/api'
      : 'https://serenispa2.onrender.com/api';

    const getToken = () => localStorage.getItem('token');
    const isConnected = () => getToken() !== null;

    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast--${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function updateUI() {
      const loggedIn = isConnected();
      document.getElementById('not-logged-in').hidden = loggedIn;
      document.getElementById('logged-in').hidden = !loggedIn;
      document.getElementById('nav-logout-btn').style.display = loggedIn ? 'block' : 'none';

      if (loggedIn) {
        loadReservations();
      }
    }

    async function loadReservations() {
      try {
        const res = await fetch(`${API_URL}/reservations/my-reservations`, {
          headers: { 'Authorization': `Bearer ${getToken()}` }
        });

        if (!res.ok) throw new Error('Erreur chargement réservations');

        const data = await res.json();
        renderReservations(data.reservations);
      } catch (err) {
        document.getElementById('reservations-container').innerHTML =
          `<p class="error-msg" style="padding: 2rem; text-align: center;">❌ ${err.message}</p>`;
      }
    }

    function renderReservations(reservations) {
      const container = document.getElementById('reservations-container');

      if (!reservations || reservations.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 3rem; background: var(--beige-clair); border-radius: 8px;">
            <p style="font-size: 3rem; margin-bottom: 1rem;">📅</p>
            <p style="color: var(--texte-gris); margin-bottom: 1.5rem;">Vous n'avez aucune réservation pour le moment.</p>
            <a href="index.html#reservation" class="btn">Réserver un massage</a>
          </div>
        `;
        return;
      }

      const future = reservations.filter(r => new Date(r.date) > new Date());
      const past = reservations.filter(r => new Date(r.date) <= new Date());

      let html = '';

      if (future.length > 0) {
        html += '<h3 style="margin-top: 2rem; margin-bottom: 1rem; color: var(--titres);">Réservations à venir</h3>';
        html += renderTable(future);
      }

      if (past.length > 0) {
        html += '<h3 style="margin-top: 2.5rem; margin-bottom: 1rem; color: var(--titres);">Réservations passées</h3>';
        html += renderTable(past, true);
      }

      container.innerHTML = html;
    }

    function renderTable(reservations, isPast = false) {
      return `
        <div style="overflow-x: auto;">
          <table style="width: 100%; border-collapse: collapse; margin-bottom: 2rem;">
            <thead>
              <tr style="background: var(--beige-clair);">
                <th style="padding: 0.8rem; text-align: left; font-weight: 600;">Massage</th>
                <th style="padding: 0.8rem; text-align: left; font-weight: 600;">Thérapeute</th>
                <th style="padding: 0.8rem; text-align: left; font-weight: 600;">Date & Heure</th>
                <th style="padding: 0.8rem; text-align: left; font-weight: 600;">Prix</th>
                ${!isPast ? '<th style="padding: 0.8rem; text-align: left; font-weight: 600;">Action</th>' : ''}
              </tr>
            </thead>
            <tbody>
              ${reservations.map(r => `
                <tr style="border-bottom: 1px solid var(--beige-bord);">
                  <td style="padding: 0.8rem;">${r.massageId.nom}</td>
                  <td style="padding: 0.8rem;">${r.therapistId.nom}</td>
                  <td style="padding: 0.8rem;">
                    ${new Date(r.date).toLocaleDateString('fr-FR')} à
                    ${new Date(r.date).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}
                  </td>
                  <td style="padding: 0.8rem;">${r.massageId.prix}€</td>
                  ${!isPast ? `
                    <td style="padding: 0.8rem;">
                      <button onclick="cancelReservation('${r._id}')" class="btn btn--sm btn--outline" style="font-size: 0.8rem;">
                        Annuler
                      </button>
                    </td>
                  ` : ''}
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    async function cancelReservation(reservationId) {
      if (!confirm('Êtes-vous sûr de vouloir annuler cette réservation ?')) {
        return;
      }

      try {
        const res = await fetch(`${API_URL}/reservations/${reservationId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${getToken()}` }
        });

        if (!res.ok) throw new Error('Erreur annulation');

        showToast('✅ Réservation annulée', 'success');
        loadReservations();
      } catch (err) {
        showToast(`❌ ${err.message}`, 'error');
      }
    }

    // Logout
    document.getElementById('nav-logout-btn').addEventListener('click', () => {
      localStorage.clear();
      location.href = 'index.html';
    });

    // Burger menu
    const burger = document.getElementById('burger-btn');
    const menu = document.getElementById('nav-menu');
    const overlay = document.createElement('div');
    overlay.className = 'nav-overlay';
    document.body.appendChild(overlay);

    function openMenu() {
      burger.setAttribute('aria-expanded', 'true');
      menu.classList.add('is-open');
      overlay.classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }

    function closeMenu() {
      burger.setAttribute('aria-expanded', 'false');
      menu.classList.remove('is-open');
      overlay.classList.remove('is-open');
      document.body.style.overflow = '';
    }

    burger.onclick = () => {
      const isOpen = burger.getAttribute('aria-expanded') === 'true';
      isOpen ? closeMenu() : openMenu();
    };

    overlay.onclick = closeMenu;
    menu.querySelectorAll('.nav__link').forEach(link => {
      link.addEventListener('click', closeMenu);
    });

    // Init
    updateUI();
  </script>
</body>
</html>
